<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>HabitFlow – Daily Tracker</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="shortcut icon" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ─── Design Tokens ─────────────────────────────────────────── */
  :root {
    --bg:            #f6f7f9;
    --surface:       #ffffff;
    --surface2:      #f1f4f8;
    --surface3:      #e4e9f0;
    --border:        #e4e9f0;
    --border-light:  #f1f4f8;
    --text:          #0d1117;
    --text-2:        #5c6b7a;
    --text-3:        #96a3b0;
    --accent:        #6366f1;
    --accent-hover:  #4f46e5;
    --accent-light:  #eef2ff;
    --today-bg:      #eef2ff;
    --today-hover:   #e0e7ff;
    --today-col:     #eef2ff;
    --green:         #10b981;
    --green-light:   #d1fae5;
    --green-text:    #065f46;
    --amber:         #f59e0b;
    --amber-light:   #fef3c7;
    --amber-text:    #92400e;
    --red:           #ef4444;
    --red-light:     #fee2e2;
    --red-text:      #991b1b;
    --radius:        14px;
    --radius-sm:     9px;
    --radius-xs:     6px;
    --shadow:        0 1px 2px rgba(0,0,0,.04), 0 3px 10px rgba(0,0,0,.04);
    --shadow-md:     0 4px 20px rgba(0,0,0,.08);
    --shadow-lg:     0 12px 48px rgba(0,0,0,.14);
    --font:          'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:          'DM Mono', 'Courier New', monospace;
    --ease:          cubic-bezier(.4,0,.2,1);
  }

  [data-theme="dark"] {
    --bg:            #0a0a0f;
    --surface:       #13131a;
    --surface2:      #1c1c26;
    --surface3:      #2a2a38;
    --border:        #2a2a38;
    --border-light:  #1c1c26;
    --text:          #f0f0f8;
    --text-2:        #8888aa;
    --text-3:        #55556a;
    --accent:        #818cf8;
    --accent-hover:  #6366f1;
    --accent-light:  #1a1a2e;
    --today-bg:      #1a1a2e;
    --today-hover:   #252540;
    --today-col:     #1a1a2e;
    --green:         #34d399;
    --green-light:   #052e16;
    --green-text:    #6ee7b7;
    --amber:         #fbbf24;
    --amber-light:   #451a03;
    --amber-text:    #fde68a;
    --red:           #f87171;
    --red-light:     #2d0505;
    --red-text:      #fca5a5;
    --shadow:        0 1px 2px rgba(0,0,0,.4), 0 3px 10px rgba(0,0,0,.25);
    --shadow-md:     0 4px 20px rgba(0,0,0,.5);
    --shadow-lg:     0 12px 48px rgba(0,0,0,.6);
  }

  /* ─── Reset & Base ──────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    transition: background .25s var(--ease), color .25s var(--ease);
  }

  /* ─── Layout ────────────────────────────────────────────────── */
  .app {
    max-width: 1280px;
    margin: 0 auto;
    padding: 22px 20px;
  }

  /* ─── Header ────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 12px;
    flex-wrap: nowrap;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    text-decoration: none;
    color: inherit;
  }
  .brand-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .brand-text h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -.03em;
    line-height: 1.1;
  }
  .brand-text span {
    font-size: .7rem;
    color: var(--text-2);
    font-weight: 400;
  }

  /* ─── Header Right ───────────────────────────────────────────── */
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .header-actions-desktop {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-actions-desktop a { text-decoration: none; }

  /* ─── Month / Year Nav ──────────────────────────────────────── */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px 5px;
    box-shadow: var(--shadow);
  }
  .month-nav button {
    background: none;
    border: none;
    cursor: pointer;
    width: 28px; height: 28px;
    border-radius: var(--radius-xs);
    display: grid;
    place-items: center;
    color: var(--text-2);
    transition: background .15s, color .15s;
  }
  .month-nav button:hover { background: var(--surface2); color: var(--text); }
  .month-nav .month-label {
    font-size: .84rem;
    font-weight: 600;
    min-width: 118px;
    text-align: center;
    letter-spacing: -.01em;
    color: var(--text);
  }

  /* ─── Buttons ───────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 13px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    cursor: pointer;
    font-family: var(--font);
    font-size: .8rem;
    font-weight: 600;
    transition: all .15s var(--ease);
    white-space: nowrap;
    line-height: 1.4;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active { transform: scale(.96) !important; }
  .btn svg { flex-shrink: 0; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(99,102,241,.35); }

  .btn-outline {
    background: var(--surface);
    color: var(--text-2);
    border-color: var(--border);
  }
  .btn-outline:hover { background: var(--surface2); color: var(--text); }

  .btn-danger {
    background: var(--red-light);
    color: var(--red-text);
  }
  .btn-danger:hover { opacity: .85; }

  .btn-tracker {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-tracker:hover { background: var(--surface2); transform: translateY(-1px); }

  .btn-dashboard {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-dashboard:hover { background: var(--accent-hover); border-color: var(--accent-hover); transform: translateY(-1px); }

  .btn-export-daily {
    background: var(--green-light);
    color: var(--green-text);
  }
  .btn-export-daily:hover { opacity: .85; }

  .btn-export-month {
    background: var(--amber-light);
    color: var(--amber-text);
  }
  .btn-export-month:hover { opacity: .85; }

  /* ─── Theme Toggle ──────────────────────────────────────────── */
  .theme-btn {
    width: 34px; height: 34px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    display: grid;
    place-items: center;
    color: var(--text-2);
    transition: all .15s;
    flex-shrink: 0;
  }
  .theme-btn:hover { background: var(--surface2); color: var(--text); }

  /* ─── Tracker Card ──────────────────────────────────────────── */
  .tracker-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .tracker-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-light);
    gap: 10px;
  }
  .tracker-card-header h2 {
    font-size: .9rem;
    font-weight: 600;
  }

  /* ─── Scroll hint ────────────────────────────────────────────── */
  .scroll-hint {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    font-size: .72rem;
    color: var(--text-3);
    background: var(--surface2);
    border-bottom: 1px solid var(--border-light);
  }

  /* ─── Tracker Table ──────────────────────────────────────────── */
  .tracker-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-x: contain;
  }
  .tracker-scroll::-webkit-scrollbar { height: 4px; }
  .tracker-scroll::-webkit-scrollbar-track { background: transparent; }
  .tracker-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  table.tracker {
    width: 100%;
    border-collapse: collapse;
    font-size: .78rem;
  }
  table.tracker th {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 8px 3px;
    text-align: center;
    font-weight: 600;
    color: var(--text-2);
    font-size: .66rem;
    text-transform: uppercase;
    letter-spacing: .05em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    z-index: 1;
  }
  table.tracker th.habit-col {
    text-align: left;
    padding-left: 16px;
    min-width: 148px;
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--surface);
    border-right: 1px solid var(--border-light);
  }
  table.tracker th.week-sep { border-left: 2px solid var(--border); }
  table.tracker th.today-col {
    color: var(--accent);
    background: var(--today-col);
  }

  table.tracker td {
    padding: 0;
    text-align: center;
    border-bottom: 1px solid var(--border-light);
  }
  table.tracker td.habit-cell {
    text-align: left;
    padding: 9px 8px 9px 16px;
    position: sticky;
    left: 0;
    background: var(--surface);
    border-right: 1px solid var(--border-light);
    z-index: 1;
  }
  table.tracker td.week-sep { border-left: 2px solid var(--border); }

  .habit-name-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .habit-emoji { font-size: .92rem; flex-shrink: 0; }
  .habit-name { font-weight: 500; white-space: nowrap; font-size: .78rem; overflow: hidden; text-overflow: ellipsis; max-width: 92px; }
  .habit-actions {
    display: flex;
    gap: 1px;
    opacity: 0;
    transition: opacity .15s;
    margin-left: auto;
    padding-right: 4px;
    flex-shrink: 0;
  }
  tr:hover .habit-actions { opacity: 1; }

  /* Always show actions on touch devices */
  @media (hover: none) {
    .habit-actions { opacity: 1; }
  }

  .habit-actions button {
    background: none;
    border: none;
    cursor: pointer;
    width: 24px; height: 24px;
    border-radius: 5px;
    display: grid;
    place-items: center;
    font-size: .7rem;
    transition: background .12s;
    color: var(--text-3);
  }
  .habit-actions button:hover { background: var(--surface2); color: var(--text); }
  .habit-actions button.del:hover { background: var(--red-light); color: var(--red-text); }

  /* ─── Day Cells ─────────────────────────────────────────────── */
  .day-cell {
    width: 30px;
    height: 44px;
    cursor: pointer;
    position: relative;
    transition: background .1s;
  }
  .day-cell:hover { background: var(--surface2); }
  .day-cell.future { opacity: .28; pointer-events: none; }
  .day-cell.today-col { background: var(--today-bg); }
  .day-cell.today-col:hover { background: var(--today-hover); }
  .check-inner {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    margin: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .12s;
    background: var(--surface);
    pointer-events: none;
  }
  .day-cell.done .check-inner {
    border-color: transparent;
    color: #fff;
    font-size: .64rem;
  }
  .day-cell.loading .check-inner { opacity: .4; }

  /* ─── Day Header ─────────────────────────────────────────────── */
  .day-header-num { font-weight: 700; display: block; }
  .day-header-dow { font-size: .57rem; font-weight: 400; color: var(--text-3); }

  /* ─── Footer rows ─────────────────────────────────────────────── */
  tr.footer-row td {
    padding: 4px 2px;
    font-size: .64rem;
    font-family: var(--mono);
    color: var(--text-2);
    font-weight: 500;
    background: var(--surface);
    border-top: 2px solid var(--border);
  }
  tr.footer-row td.habit-cell {
    font-family: var(--font);
    font-size: .66rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-3);
  }
  .day-pct-bar {
    width: 20px;
    margin: 2px auto 0;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .day-pct-bar-fill { height: 100%; border-radius: 2px; }

  /* ─── Charts ─────────────────────────────────────────────────── */
  .charts-section {
    margin-top: 18px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px 14px;
  }
  .chart-card h3 {
    font-size: .75rem;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .chart-card canvas { max-height: 200px; }

  /* ─── Modal ──────────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px;
    padding: 26px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    animation: popIn .22s var(--ease) both;
    border: 1px solid var(--border);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.94) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }
  .modal h3 { font-size: 1.05rem; font-weight: 700; }
  .modal-close {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--surface2);
    border: none;
    cursor: pointer;
    display: grid;
    place-items: center;
    color: var(--text-2);
    font-size: 1rem;
    transition: all .15s;
  }
  .modal-close:hover { background: var(--surface3); color: var(--text); }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-2);
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: var(--font);
    font-size: .9rem;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .form-group input:focus { border-color: var(--accent); background: var(--surface); }
  .form-group input::placeholder { color: var(--text-3); }

  .emoji-picker {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    margin-top: 4px;
  }
  .emoji-opt {
    aspect-ratio: 1;
    border-radius: 7px;
    border: 1.5px solid transparent;
    background: var(--surface2);
    cursor: pointer;
    font-size: .95rem;
    display: grid;
    place-items: center;
    transition: all .12s;
  }
  .emoji-opt.selected, .emoji-opt:hover { border-color: var(--accent); background: var(--accent-light); }

  .color-picker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .color-opt {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform .12s;
    outline: 2.5px solid transparent;
    outline-offset: 2px;
  }
  .color-opt.selected { outline-color: var(--accent); transform: scale(1.18); }

  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
  .modal-actions .btn { flex: 1; justify-content: center; padding: 10px; font-size: .85rem; }

  /* ─── Toast ──────────────────────────────────────────────────── */
  .toast-wrap {
    position: fixed;
    bottom: 88px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 300;
    pointer-events: none;
  }
  .toast {
    background: var(--text);
    color: var(--bg);
    padding: 9px 15px;
    border-radius: 10px;
    font-size: .8rem;
    font-weight: 500;
    box-shadow: var(--shadow-md);
    animation: toastIn .22s var(--ease);
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: all;
    max-width: 300px;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(16px) scale(.95); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }

  /* ─── Skeleton ───────────────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ─── Empty State ────────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 56px 24px;
    color: var(--text-3);
  }
  .empty-state .icon { font-size: 2.6rem; margin-bottom: 14px; }
  .empty-state p { font-size: .86rem; line-height: 1.6; max-width: 240px; margin: 0 auto; }

  /* ─── Mobile Bottom Nav ──────────────────────────────────────── */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 6px 16px calc(6px + env(safe-area-inset-bottom));
    z-index: 100;
    align-items: center;
    justify-content: space-around;
    gap: 4px;
  }
  /* Frosted glass effect */
  @supports (backdrop-filter: blur(12px)) {
    .mobile-nav {
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    [data-theme="dark"] .mobile-nav {
      background: rgba(19,19,26,.9);
    }
  }
  .mobile-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    text-decoration: none;
    color: var(--text-3);
    font-size: .63rem;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: var(--radius-sm);
    transition: color .15s;
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    letter-spacing: .01em;
  }
  .mobile-nav-item.active { color: var(--accent); }

  .mobile-nav-fab {
    width: 50px; height: 50px;
    border-radius: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    display: grid;
    place-items: center;
    box-shadow: 0 4px 18px rgba(99,102,241,.42);
    transition: all .18s var(--ease);
    transform: translateY(-8px);
    flex-shrink: 0;
  }
  .mobile-nav-fab:active { transform: translateY(-6px) scale(.95); }

  /* ─── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 640px) {
    .app { padding: 14px 12px calc(82px + env(safe-area-inset-bottom)); }
    header { margin-bottom: 14px; }
    .brand-text span { display: none; }
    .mobile-nav { display: flex; }
    .header-actions-desktop { display: none; }
    .scroll-hint { display: flex; }
    .charts-section { grid-template-columns: 1fr; gap: 12px; }
    .month-nav .month-label { min-width: 100px; font-size: .8rem; }

    /* Modal as bottom sheet */
    .modal-overlay.open { align-items: flex-end; padding: 0; }
    .modal {
      border-radius: 20px 20px 0 0;
      max-width: 100%;
      padding: 22px 18px calc(22px + env(safe-area-inset-bottom));
      animation: slideSheet .25s var(--ease) both;
    }
    @keyframes slideSheet {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* Toast adjustments */
    .toast-wrap {
      bottom: calc(82px + env(safe-area-inset-bottom) + 8px);
      right: 12px;
      left: 12px;
    }
    .toast { max-width: 100%; justify-content: center; }
  }

  @media (max-width: 400px) {
    .month-nav .month-label { min-width: 86px; font-size: .76rem; }
    table.tracker th.habit-col { min-width: 120px; }
    .habit-name { max-width: 66px; }
  }
</style>
</head>
<body>

  <header>

      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

    </div>

</div>

<!-- ── Mobile Bottom Nav ────────────────────────────────────────── -->
<nav class="mobile-nav" aria-label="Mobile navigation">
  <a href="/" class="mobile-nav-item active" aria-current="page">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>

  </a>

<!-- ── Add / Edit Habit Modal ────────────────────────────────────── -->
<div class="modal-overlay" id="habitModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">

    </div>
  </div>
</div>

<!-- ── Toast container ───────────────────────────────────────────── -->
<div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════════ */
const html = document.documentElement;

const SUN_PATH = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
const MOON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

function applyTheme(theme) {
  html.dataset.theme = theme;
  localStorage.setItem('hf-theme', theme);
  const icon = document.getElementById('themeIconSvg');
  if (icon) icon.innerHTML = theme === 'dark' ? MOON_PATH : SUN_PATH;
  updateChartTheme();
}

function initTheme() {
  const saved = localStorage.getItem('hf-theme');
  const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  applyTheme(saved || preferred);
}

// ── theme toggle & init are deferred to BOOT (after all let declarations) ──

/* ═══════════════════════════════════════════════════════════════
   CHART THEME HELPERS
═══════════════════════════════════════════════════════════════ */
function getChartColors() {
  const dark = html.dataset.theme === 'dark';
  return {
    grid:      dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)',
    text:      dark ? '#8888aa' : '#5c6b7a',
    green:     dark ? '#34d399' : '#10b981',
    greenFill: dark ? 'rgba(52,211,153,.12)' : 'rgba(16,185,129,.14)',
    blue:      dark ? '#818cf8' : '#6366f1',
    blueFill:  dark ? 'rgba(129,140,248,.18)' : 'rgba(99,102,241,.18)',
  };
}

function updateChartTheme() {
  if (typeof Chart === 'undefined') return;
  const c = getChartColors();
  Chart.defaults.color = c.text;
  Chart.defaults.borderColor = c.grid;
  if (chartDailyPct || chartDailyDone) renderCharts();
}

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
const today = new Date();
let currentYear  = today.getFullYear();
let currentMonth = today.getMonth() + 1;
let habits       = [];
let completions  = {};
let stats        = {};
let editingHabitId = null;
let chartDailyPct  = null;
let chartDailyDone = null;

const EMOJIS = ['🌅','💪','📖','💧','🧘','📵','💰','🎯','🏃','🥗','😴','✍️','🎵','🌿','🔥','⭐','💡','🛡️','🏋️','🧠'];
const COLORS = ['#22c55e','#6366f1','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#f97316','#10b981','#0ea5e9'];

let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
async function init() {
  buildEmojiPicker();
  buildColorPicker();
  setupNav();
  setupModal();
  setupExport();
  await loadAll();
}

/* ═══════════════════════════════════════════════════════════════
   LOAD
═══════════════════════════════════════════════════════════════ */
async function loadAll() {
  updateMonthLabel();
  await Promise.all([loadHabits(), loadCompletions(), loadStats()]);
  renderTracker();
  renderCharts();
}

async function loadHabits() {
  const res = await fetch('/api/habits');
  habits = await res.json();
}
async function loadCompletions() {
  const res = await fetch(`/api/completions/${currentYear}/${currentMonth}`);
  completions = await res.json();
}
async function loadStats() {
  const res = await fetch(`/api/stats/${currentYear}/${currentMonth}`);
  stats = await res.json();
}

/* ═══════════════════════════════════════════════════════════════
   RENDER TRACKER
═══════════════════════════════════════════════════════════════ */
function renderTracker() {
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const todayStr    = fmtDate(today);

  if (!habits.length) {
    document.getElementById('trackerTable').innerHTML = `
      <div class="empty-state">
        <div class="icon">🌱</div>
        <p>No habits yet. Tap <strong>Add Habit</strong> to start tracking!</p>
      </div>`;
    return;
  }

  // Build week groupings
  const weeks = [];
  let cur = [];
  for (let d = 1; d <= daysInMonth; d++) {
    cur.push(d);
    const dow = new Date(currentYear, currentMonth - 1, d).getDay();
    if (dow === 6 || d === daysInMonth) { weeks.push([...cur]); cur = []; }
  }

  // Week header row
  let thCols = `<th class="habit-col">My Habits</th>`;
  weeks.forEach((wk, wi) => {
    const cls = wi > 0 ? ' week-sep' : '';
    thCols += `<th colspan="${wk.length}" class="${cls}" style="font-size:.65rem;font-weight:700">W${wi + 1}</th>`;
  });

  // Day header row
  let th2 = `<th class="habit-col"></th>`;
  weeks.forEach((wk, wi) => {
    wk.forEach((d, di) => {
      const dateStr = fmtDateParts(currentYear, currentMonth, d);
      const dow     = ['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(currentYear, currentMonth - 1, d).getDay()];
      const isToday = dateStr === todayStr;
      const cls     = [(di === 0 && wi > 0) ? 'week-sep' : '', isToday ? 'today-col' : ''].filter(Boolean).join(' ');
      th2 += `<th class="${cls}">
        <span class="day-header-num">${d}</span>
        <span class="day-header-dow">${dow}</span>
      </th>`;
    });
  });

  // Body rows
  let bodyRows = '';
  habits.forEach(h => {
    let cells = `<td class="habit-cell">
      <div class="habit-name-row">
        <span class="habit-emoji">${h.emoji}</span>
        <span class="habit-name" title="${escHtml(h.name)}">${escHtml(h.name)}</span>
        <div class="habit-actions">
          <button title="Edit habit" onclick="openEditModal(${h.id})">✏️</button>
          <button class="del" title="Delete habit" onclick="deleteHabit(${h.id})">🗑️</button>
        </div>
      </div>
    </td>`;

    weeks.forEach((wk, wi) => {
      wk.forEach((d, di) => {
        const dateStr = fmtDateParts(currentYear, currentMonth, d);
        const key     = `${h.id}_${dateStr}`;
        const done    = !!completions[key];
        const isFuture = dateStr > todayStr;
        const isToday  = dateStr === todayStr;
        const cls      = ['day-cell', done ? 'done' : '', isFuture ? 'future' : '', isToday ? 'today-col' : '', (di === 0 && wi > 0) ? 'week-sep' : ''].filter(Boolean).join(' ');
        cells += `<td class="${cls}" onclick="toggleCompletion(${h.id},'${dateStr}',this)" data-habit="${h.id}" data-date="${dateStr}">
          <div class="check-inner" style="${done ? `background:${h.color}` : ''}">
            ${done ? '✓' : ''}
          </div>
        </td>`;
      });
    });

    bodyRows += `<tr>${cells}</tr>`;
  });

  // Footer
  let fDone = `<td class="habit-cell" style="color:var(--text-3);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em">Done</td>`;
  let fPct  = `<td class="habit-cell" style="color:var(--text-3);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em">%</td>`;
  if (stats.day_stats) {
    weeks.forEach((wk, wi) => {
      wk.forEach((d, di) => {
        const ds  = stats.day_stats[d - 1];
        const pct = ds ? ds.pct : 0;
        const barColor = pct >= 80 ? '#22c55e' : pct >= 50 ? '#f59e0b' : '#ef4444';
        const cls = (di === 0 && wi > 0) ? 'week-sep' : '';
        fDone += `<td class="${cls}" style="color:var(--text-2);font-size:.68rem">${ds ? ds.done : 0}</td>`;
        fPct  += `<td class="${cls}">
          <div style="font-size:.62rem;color:var(--text-2)">${pct}%</div>
          <div class="day-pct-bar"><div class="day-pct-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        </td>`;
      });
    });
  }

  document.getElementById('trackerTable').innerHTML = `
    <table class="tracker">
      <thead>
        <tr>${thCols}</tr>
        <tr>${th2}</tr>
      </thead>
      <tbody>${bodyRows}</tbody>
      <tfoot>
        <tr class="footer-row">${fDone}</tr>
        <tr class="footer-row">${fPct}</tr>
      </tfoot>
    </table>`;

  // Auto-scroll to today on mobile
  if (window.innerWidth <= 640) {
    requestAnimationFrame(() => {
      const todayTh = document.querySelector('th.today-col');
      if (todayTh) todayTh.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
  }
}

/* ═══════════════════════════════════════════════════════════════
   CHARTS
═══════════════════════════════════════════════════════════════ */
function renderCharts() {
  if (typeof Chart === 'undefined') return;
  const c = getChartColors();
  if (chartDailyPct)  { chartDailyPct.destroy();  chartDailyPct  = null; }
  if (chartDailyDone) { chartDailyDone.destroy();  chartDailyDone = null; }
  if (!habits.length || !stats.day_stats || !stats.day_stats.length) return;

  const labels = stats.day_stats.map((_, i) => String(i + 1));
  const pcts   = stats.day_stats.map(d => d.pct);
  const dones  = stats.day_stats.map(d => d.done);

  const baseOpts = {
    responsive: true,
    maintainAspectRatio: true,
    interaction: { intersect: false, mode: 'index' },
    plugins: { legend: { display: false } },
  };

  const scaleStyle = {
    grid: { color: c.grid },
    ticks: { color: c.text, font: { family: "'DM Sans', sans-serif", size: 11 } },
    border: { color: 'transparent' },
  };

  chartDailyPct = new Chart(document.getElementById('chartDailyPct'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Completion %',
        data: pcts,
        borderColor: c.green,
        backgroundColor: c.greenFill,
        fill: true,
        tension: 0.38,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: c.green,
        borderWidth: 2,
      }],
    },
    options: {
      ...baseOpts,
      scales: {
        y: { ...scaleStyle, min: 0, max: 100, ticks: { ...scaleStyle.ticks, callback: v => v + '%' } },
        x: { ...scaleStyle, title: { display: true, text: 'Day', color: c.text, font: { size: 11 } } },
      },
    },
  });

  chartDailyDone = new Chart(document.getElementById('chartDailyDone'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Check-ins',
        data: dones,
        backgroundColor: c.blueFill,
        borderColor: c.blue,
        borderWidth: 1.5,
        borderRadius: 4,
        borderSkipped: false,
      }],
    },
    options: {
      ...baseOpts,
      scales: {
        y: { ...scaleStyle, min: 0, suggestedMax: Math.max(1, habits.length), ticks: { ...scaleStyle.ticks, stepSize: 1 } },
        x: { ...scaleStyle, title: { display: true, text: 'Day', color: c.text, font: { size: 11 } } },
      },
    },
  });
}

/* ═══════════════════════════════════════════════════════════════
   TOGGLE COMPLETION
═══════════════════════════════════════════════════════════════ */
async function toggleCompletion(habitId, dateStr, cell) {
  const key = `${habitId}_${dateStr}`;
  cell.classList.add('loading');
  cell.style.pointerEvents = 'none';
  try {
    const res  = await fetch('/api/completions/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ habit_id: habitId, date: dateStr }),
    });
    const data   = await res.json();
    const habit  = habits.find(h => h.id === habitId);
    const inner  = cell.querySelector('.check-inner');
    if (data.completed) {
      completions[key] = true;
      cell.classList.add('done');
      inner.style.background = habit ? habit.color : '#22c55e';
      inner.textContent = '✓';
    } else {
      delete completions[key];
      cell.classList.remove('done');
      inner.style.background = '';
      inner.textContent = '';
    }
    await loadStats();
    renderCharts();
    renderTrackerFooter();
  } finally {
    cell.classList.remove('loading');
    cell.style.pointerEvents = '';
  }
}

function renderTrackerFooter() {
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const tfoot = document.querySelector('table.tracker tfoot');
  if (!tfoot || !stats.day_stats) return;
  const rows = tfoot.querySelectorAll('tr.footer-row');
  if (rows.length < 2) return;
  const weeks = [];
  let cur = [];
  for (let d = 1; d <= daysInMonth; d++) {
    cur.push(d);
    const dow = new Date(currentYear, currentMonth - 1, d).getDay();
    if (dow === 6 || d === daysInMonth) { weeks.push([...cur]); cur = []; }
  }
  let fDone = `<td class="habit-cell" style="color:var(--text-3);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em">Done</td>`;
  let fPct  = `<td class="habit-cell" style="color:var(--text-3);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em">%</td>`;
  weeks.forEach((wk, wi) => {
    wk.forEach((d, di) => {
      const ds  = stats.day_stats[d - 1];
      const pct = ds ? ds.pct : 0;
      const barColor = pct >= 80 ? '#22c55e' : pct >= 50 ? '#f59e0b' : '#ef4444';
      const cls = (di === 0 && wi > 0) ? 'week-sep' : '';
      fDone += `<td class="${cls}" style="color:var(--text-2);font-size:.68rem">${ds ? ds.done : 0}</td>`;
      fPct  += `<td class="${cls}">
        <div style="font-size:.62rem;color:var(--text-2)">${pct}%</div>
        <div class="day-pct-bar"><div class="day-pct-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </td>`;
    });
  });
  rows[0].innerHTML = fDone;
  rows[1].innerHTML = fPct;
}

/* ═══════════════════════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════════════════════ */
function setupNav() {
  document.getElementById('prevMonth').onclick = () => {
    if (currentMonth === 1) { currentMonth = 12; currentYear--; } else currentMonth--;
    loadAll();
  };
  document.getElementById('nextMonth').onclick = () => {
    if (currentMonth === 12) { currentMonth = 1; currentYear++; } else currentMonth++;
    loadAll();
  };
}

function updateMonthLabel() {
  const names = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthLabel').textContent = `${names[currentMonth - 1]} ${currentYear}`;
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════ */
function setupModal() {
  document.getElementById('addHabitBtn').onclick     = () => openAddModal();
  document.getElementById('mobileAddBtn').onclick    = () => openAddModal();
  document.getElementById('modalCancel').onclick     = closeModal;
  document.getElementById('modalClose').onclick      = closeModal;
  document.getElementById('modalSave').onclick       = saveHabit;
  document.getElementById('habitModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('habitNameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveHabit();
  });
}

function openAddModal() {
  editingHabitId = null;
  document.getElementById('modalTitle').textContent = 'Add New Habit';
  document.getElementById('habitNameInput').value   = '';
  selectedEmoji = EMOJIS[0];
  selectedColor = COLORS[0];
  updateEmojiSelection();
  updateColorSelection();
  document.getElementById('habitModal').classList.add('open');
  setTimeout(() => document.getElementById('habitNameInput').focus(), 80);
}

function openEditModal(id) {
  const h = habits.find(x => x.id === id);
  if (!h) return;
  editingHabitId = id;
  document.getElementById('modalTitle').textContent = 'Edit Habit';
  document.getElementById('habitNameInput').value   = h.name;
  selectedEmoji = h.emoji;
  selectedColor = h.color;
  updateEmojiSelection();
  updateColorSelection();
  document.getElementById('habitModal').classList.add('open');
  setTimeout(() => document.getElementById('habitNameInput').focus(), 80);
}

function closeModal() {
  document.getElementById('habitModal').classList.remove('open');
  editingHabitId = null;
}

async function saveHabit() {
  const name = document.getElementById('habitNameInput').value.trim();
  if (!name) { showToast('Please enter a habit name', '⚠️'); return; }
  const payload = { name, emoji: selectedEmoji, color: selectedColor };
  let res;
  if (editingHabitId) {
    res = await fetch(`/api/habits/${editingHabitId}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });
  } else {
    res = await fetch('/api/habits', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
    });
  }
  if (res.ok) {
    closeModal();
    showToast(editingHabitId ? 'Habit updated!' : 'Habit added! 🎉', '✅');
    await loadAll();
  }
}

async function deleteHabit(id) {
  const h = habits.find(x => x.id === id);
  if (!confirm(`Remove "${h?.name}" from tracking? Your history will be preserved.`)) return;
  await fetch(`/api/habits/${id}`, { method: 'DELETE' });
  showToast('Habit removed', '🗑️');
  await loadAll();
}

/* ═══════════════════════════════════════════════════════════════
   PICKERS
═══════════════════════════════════════════════════════════════ */
function buildEmojiPicker() {
  document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')" role="button" tabindex="0">${e}</div>`
  ).join('');
}
function buildColorPicker() {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
    `<div class="color-opt ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')" title="${c}" role="button" tabindex="0"></div>`
  ).join('');
}
function selectEmoji(e) { selectedEmoji = e; updateEmojiSelection(); }
function selectColor(c) { selectedColor = c; updateColorSelection(); }
function updateEmojiSelection() {
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent.trim() === selectedEmoji));
}
function updateColorSelection() {
  document.querySelectorAll('.color-opt').forEach(el => {
    const bg = el.style.background || el.style.backgroundColor;
    el.classList.toggle('selected', bg === selectedColor || bg === hexToRgb(selectedColor));
  });
}
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

/* ═══════════════════════════════════════════════════════════════
   EXPORT CSV
═══════════════════════════════════════════════════════════════ */
function csvEscape(val) {
  const t = String(val);
  return /[",\n\r]/.test(t) ? '"' + t.replace(/"/g, '""') + '"' : t;
}
function downloadCsv(filename, rows) {
  const blob = new Blob([rows.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
function exportDailyCsv() {
  if (!stats.day_stats || !stats.day_stats.length) { showToast('No data for this month', '⚠️'); return; }
  const wdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const lines = ['date,weekday,completed,total_habits,percent_complete'];
  stats.day_stats.forEach((ds, idx) => {
    const day = idx + 1;
    const dateStr = fmtDateParts(currentYear, currentMonth, day);
    const wd = wdays[new Date(currentYear, currentMonth - 1, day).getDay()];
    lines.push([dateStr, wd, ds.done, ds.total, Number(ds.pct).toFixed(2)].map(csvEscape).join(','));
  });
  const fn = `habitflow-daily-${currentYear}-${String(currentMonth).padStart(2,'0')}.csv`;
  downloadCsv(fn, lines);
  showToast('Exported ' + fn, '✅');
}
function exportMonthCsv() {
  if (!habits.length) { showToast('Add habits before exporting', '⚠️'); return; }
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const lines = [`summary,overall_percent,${stats.overall_pct ?? ''},total_done,${stats.total_done ?? ''},total_possible,${stats.total_possible ?? ''},active_habits,${habits.length}`];
  lines.push(['date', ...habits.map(h => h.name)].map(csvEscape).join(','));
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = fmtDateParts(currentYear, currentMonth, d);
    const row = [dateStr, ...habits.map(h => completions[`${h.id}_${dateStr}`] ? '1' : '0')];
    lines.push(row.map(csvEscape).join(','));
  }
  const fn = `habitflow-month-${currentYear}-${String(currentMonth).padStart(2,'0')}.csv`;
  downloadCsv(fn, lines);
  showToast('Exported ' + fn, '✅');
}
function setupExport() {
  document.getElementById('exportDailyBtn').onclick = exportDailyCsv;
  document.getElementById('exportMonthBtn').onclick = exportMonthCsv;
}

/* ═══════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════ */
function showToast(msg, icon = 'ℹ️') {
  const wrap = document.getElementById('toastWrap');
  const el   = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${icon}</span><span>${escHtml(msg)}</span>`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

/* ═══════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateParts(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

});
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (!localStorage.getItem('hf-theme')) applyTheme(e.matches ? 'dark' : 'light');
});
initTheme();
init();
